<style>

    --paper:#f1eee9;
    --paper-raised:#ffffff;
    --ink:#333333;

    --line-strong:#d2d2d2;

// Días esperados entre verificaciones, según periodicidad declarada.
// Se usa para avisar cuándo una obligación "verificable" (opiniones de
// cumplimiento, vigencias, etc.) ya debería revisarse de nuevo.
const RECHECK_DAYS = {
  'mensual':30, 'bimestral':60, 'trimestral':90, 'anual':365,
  'permanente':30, 'cada 3 años':1095
};
function recheckDaysFor(periodicity){
  const key = (periodicity||'').trim().toLowerCase();
  return RECHECK_DAYS[key] ?? 30;
}

function seedObligations(){
  const mk = (entity, title, periodicity, responsible, status, offsetDays, notes, lastCheckedOffset) => ({
    id: crypto.randomUUID(),
    entity, title, periodicity, responsible, status, notes: notes||'',
    dueDate: offsetDate(offsetDays),
    lastChecked: lastCheckedOffset!==undefined ? offsetDate(lastCheckedOffset) : null
  });
  function offsetDate(days){
    const d = new Date();
    d.setDate(d.getDate()+days);
    return d.toISOString().slice(0,10);
  }
  return [
    mk('sat','Declaración mensual ISR/IVA','Mensual','','ok',9,''),
    mk('sat','DIOT','Mensual','','ok',9,''),
    mk('sat','Declaración anual','Anual','','pendiente',180,''),
    mk('sat','Opinión de cumplimiento (32-D)','Mensual','','ok',24,'Sentido: POSITIVO · RFC MLU210715R51 · Folio 26NG3280039 (emitida 21-jul-2026). Vuelve a subir el PDF el próximo mes para refrescar este estatus.',0),
    mk('sat','Vigencia de e.firma y CSD (Certificado de Sello Digital)','Permanente','','ok',1117,'e.firma (FIEL) N° serie 00001000000717998198: Activo, vigente 11-ago-2025 a 11-ago-2029. CSD (SELLO) N° serie 00001000000717997299: Activo, vigente 11-ago-2025 a 11-ago-2029. RFC MLU210715R51 · MEXSTAYS LUMINA S A P I DE CV.',0),
    mk('imss','Pago de cuotas obrero-patronales (SUA)','Mensual','','ok',12,''),
    mk('imss','Opinión de cumplimiento IMSS','Mensual','','proceso',5,''),
    mk('imss','Dictamen IMSS (si aplica)','Anual','','pendiente',200,'Confirmar si la empresa está obligada'),
    mk('infonavit','Aportaciones patronales 5% (bimestral vía SUA)','Bimestral','','ok',20,''),
    mk('infonavit','Amortizaciones de crédito de trabajadores','Bimestral','','ok',20,''),
    mk('infonavit','Opinión de cumplimiento Infonavit (ICSOEP)','Mensual','','proceso',5,''),
    mk('repse','Vigencia del registro REPSE','Cada 3 años','','ok',380,''),
    mk('repse','Reporte trimestral ante STPS (REPSE)','Trimestral','','vencido',-4,'Pendiente de subir evidencia del trimestre'),
    mk('tesoreria','Impuesto sobre nómina (ISN)','Mensual','','ok',15,''),
    mk('tesoreria','Licencia de funcionamiento','Anual','','pendiente',150,''),
    mk('otros','Constancia de situación fiscal de proveedores','Permanente','','pendiente',60,''),

}

// =====================================================================
// CONFIGURACIÓN DE SUPABASE — reemplaza estos dos valores con los de

const SUPABASE_URL = 'https://mvzybyslnhkcixltddsm.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im12enlieXNsbmhrY2l4bHRkZHNtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2NTM2NTcsImV4cCI6MjEwMDIyOTY1N30.p-O_6hqF6N320kPIPznu07yaz8dCLKAgaVms9lMetFI';

// Muestra cualquier error en pantalla (en vez de una página en blanco)
// para poder diagnosticar sin depender de la consola del navegador.
function showFatalError(msg){
  const el = document.getElementById('app');
  el.classList.remove('hidden');
  el.innerHTML = `<div style="max-width:560px;margin:60px auto;padding:24px;border:1px solid #e0b0ac;background:#fdf2f1;border-radius:8px;font-family:sans-serif;color:#333;">

window.addEventListener('error', (e) => showFatalError('Error de JavaScript: ' + e.message));
window.addEventListener('unhandledrejection', (e) => showFatalError('Error de conexión: ' + (e.reason && e.reason.message ? e.reason.message : e.reason)));

let supabaseClient;
try{
  if(!window.supabase) throw new Error('La librería de Supabase no cargó (revisa tu conexión o si algo bloquea cdn.jsdelivr.net).');
  supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const STATUS_ORDER = ['ok','proceso','vencido','pendiente'];
const STATUS_LABEL = {ok:'Al corriente', proceso:'En proceso', vencido:'Vencido / incumplido', pendiente:'Pendiente / sin iniciar'};

let obligations = [];
let companyName = 'MEXSTAYS LUMINA S.A.P.I. de C.V.';
let activeFilter = null;
let openFolders = new Set();
let currentView = 'dashboard'; // 'dashboard' | 'entities' | 'settings'
let entityFormError = '';

// ---- Mapeo camelCase (JS) <-> snake_case (Postgres) ----
function fromDb(row){
  return {
    id: row.id, entity: row.entity, title: row.title, periodicity: row.periodicity,
    responsible: row.responsible, status: row.status, notes: row.notes,
    dueDate: row.due_date, lastChecked: row.last_checked,
    documentUrl: row.document_url, documentName: row.document_name
  };
}
function toDb(o){
  return {
    id: o.id, entity: o.entity, title: o.title, periodicity: o.periodicity,
    responsible: o.responsible, status: o.status, notes: o.notes,
    due_date: o.dueDate || null, last_checked: o.lastChecked || null,
    document_url: o.documentUrl || null, document_name: o.documentName || null,
    updated_at: new Date().toISOString()
  };
}

// ---- Arranque: sin login, el dashboard carga directo ----
async function initApp(){
  try{
    document.getElementById('app').classList.remove('hidden');
    await loadData();
    subscribeRealtime();
  }catch(e){
    showFatalError(e.message);
  }
}

// ---- Carga / guardado contra Supabase ----
async function loadData(){
  const { data, error } = await supabaseClient.from('obligations').select('*').order('created_at', { ascending: true });
  if(error){ console.error(error); obligations = []; }
  else if(data.length === 0){
    // Primera vez: sembramos datos de ejemplo para todo el equipo.
    obligations = seedObligations();
    await supabaseClient.from('obligations').insert(obligations.map(toDb));
  } else {
    obligations = data.map(fromDb);
  }

  const { data: settingsRow } = await supabaseClient.from('settings').select('*').eq('key','companyName').maybeSingle();
  if(settingsRow) companyName = settingsRow.value;
  else await supabaseClient.from('settings').insert({ key:'companyName', value: companyName });

  const { data: entitiesRow } = await supabaseClient.from('settings').select('*').eq('key','entities').maybeSingle();
  if(entitiesRow){
    try{ ENTITY_DEFS = JSON.parse(entitiesRow.value); }catch(e){ /* se queda con el default */ }
  } else {
    await supabaseClient.from('settings').insert({ key:'entities', value: JSON.stringify(ENTITY_DEFS) });
  }
  openFolders = new Set(ENTITY_DEFS.map(e=>e.id));

  render();
}

function showSaveError(msg){
  const el = document.getElementById('saveErrorBanner');
  if(!el) return;
  el.textContent = '⚠ No se guardó tu cambio: ' + msg;
  el.classList.remove('hidden');
  clearTimeout(window._saveErrTimeout);
  window._saveErrTimeout = setTimeout(()=>{ el.classList.add('hidden'); }, 8000);
}

async function persistObligation(o){
  const { error } = await supabaseClient.from('obligations').upsert(toDb(o));
  if(error){
    console.error('No se pudo guardar', error);
    showSaveError(error.message);
  }
}

let docUploadError = '';

async function uploadDocument(id, inputEl){
  const file = inputEl.files && inputEl.files[0];
  if(!file) return;
  docUploadError = '';
  if(file.type !== 'application/pdf'){
    docUploadError = 'Solo se aceptan archivos PDF.';
    render();
    return;
  }
  if(file.size > 15*1024*1024){
    docUploadError = 'El PDF pesa más de 15 MB, sube un archivo más ligero.';
    render();
    return;
  }
  const o = obligations.find(x=>x.id===id);
  if(!o) return;
  const path = `${id}/${Date.now()}-${file.name}`;
  const { error: upErr } = await supabaseClient.storage.from('compliance-docs').upload(path, file, { upsert:true });
  if(upErr){ docUploadError = 'No se pudo subir el PDF: ' + upErr.message; render(); return; }
  const { data: pub } = supabaseClient.storage.from('compliance-docs').getPublicUrl(path);
  o.documentUrl = pub.publicUrl;
  o.documentName = file.name;
  await persistObligation(o);
  render();
}

async function removeDocument(id){
  const o = obligations.find(x=>x.id===id);
  if(!o) return;
  o.documentUrl = null;
  o.documentName = null;
  await persistObligation(o);
  render();
}

async function saveCompany(){
  const { error } = await supabaseClient.from('settings').upsert({ key:'companyName', value: companyName });
  if(error){ console.error('No se pudo guardar', error); showSaveError(error.message); }
}

async function saveEntities(){
  const { error } = await supabaseClient.from('settings').upsert({ key:'entities', value: JSON.stringify(ENTITY_DEFS) });
  if(error){ console.error('No se pudo guardar', error); showSaveError(error.message); }
}

function slugify(name){
  const base = (name||'').toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'') // quita acentos
    .replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');
  let slug = base || 'dependencia';
  let n = 1;
  while(ENTITY_DEFS.some(e=>e.id===slug)){ slug = base + '-' + (++n); }
  return slug;
}

function deleteEntity(id){

let realtimeChannel = null;
function subscribeRealtime(){
  if(realtimeChannel) return;
  realtimeChannel = supabaseClient.channel('obligations-sync')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'obligations' }, () => { loadData(); })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'settings' }, () => { loadData(); })
    .subscribe();
}

function statusScore(status){
  return {ok:1, proceso:0.5, pendiente:0.15, vencido:0}[status] ?? 0;
}

function overallHealth(){
  if(obligations.length===0) return {pct:100, cls:'st-green'};
  const sum = obligations.reduce((a,o)=>a+statusScore(o.status),0);
  const pct = Math.round((sum/obligations.length)*100);
  let cls = 'st-green';
  if(pct<70) cls='st-red'; else if(pct<90) cls='st-amber';
  return {pct, cls};
}

function entityHealth(entityId){
  const list = obligations.filter(o=>o.entity===entityId);
  if(list.length===0) return {pct:null, cls:'st-gray'};
  const sum = list.reduce((a,o)=>a+statusScore(o.status),0);
  const pct = Math.round((sum/list.length)*100);
  let cls = 'st-green';
  if(pct<70) cls='st-red'; else if(pct<90) cls='st-amber';
  return {pct, cls};
}

function counts(){
  const c = {ok:0, proceso:0, vencido:0, pendiente:0};
  obligations.forEach(o=>{ if(c[o.status]!==undefined) c[o.status]++; });
  return c;
}

function fmtDate(iso){
  if(!iso) return '—';
  const d = new Date(iso+'T00:00:00');
  if(isNaN(d)) return iso;
  return d.toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'});
}

function daysUntil(iso){
  if(!iso) return null;
  const d = new Date(iso+'T00:00:00');
  const now = new Date(); now.setHours(0,0,0,0);
  return Math.round((d-now)/86400000);
}

function updateField(id, field, value){
  const o = obligations.find(x=>x.id===id);
  if(!o) return;
  o[field] = value;
  persistObligation(o);
}

function cycleStatus(id){
  const o = obligations.find(x=>x.id===id);
  if(!o) return;
  const idx = STATUS_ORDER.indexOf(o.status);
  o.status = STATUS_ORDER[(idx+1)%STATUS_ORDER.length];
  persistObligation(o);
  render();
}

async function deleteObligation(id){
  obligations = obligations.filter(o=>o.id!==id);
  const { error } = await supabaseClient.from('obligations').delete().eq('id', id);
  if(error) console.error('No se pudo eliminar', error);
  render();
}

function addObligation(entityId){
  const o = {
    id: crypto.randomUUID(), entity: entityId, title:'Nueva obligación',
    periodicity:'Mensual', responsible:'', status:'pendiente', notes:'',
    dueDate: new Date().toISOString().slice(0,10), lastChecked: null
  };
  obligations.push(o);
  persistObligation(o);
  render();
}

function toggleFolder(id){
  if(openFolders.has(id)) openFolders.delete(id); else openFolders.add(id);
  render();
}

function setFilter(status){
  activeFilter = (activeFilter===status) ? null : status;
  render();
}

function exportCSV(){
  const rows = [['Dependencia','Concepto','Periodicidad','Próxima fecha','Última verificación','Responsable','Estatus','Evidencia (PDF)','Notas']];
  obligations.forEach(o=>{
    const entName = ENTITY_DEFS.find(e=>e.id===o.entity)?.name || o.entity;
    rows.push([entName,o.title,o.periodicity,o.dueDate,o.lastChecked||'',o.responsible,STATUS_LABEL[o.status],o.documentUrl||'',o.notes]);
  });
  const csv = rows.map(r=>r.map(v=>'"'+String(v||'').replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob = new Blob(["\ufeff"+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'cumplimiento_'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

  const detailData = [['Dependencia','Concepto','Periodicidad','Próxima fecha','Última verificación','Responsable','Estatus','Evidencia (PDF)','Notas']];
  obligations.forEach(o=>{
    const entName = ENTITY_DEFS.find(e=>e.id===o.entity)?.name || o.entity;
    detailData.push([entName,o.title,o.periodicity,o.dueDate||'',o.lastChecked||'',o.responsible||'',STATUS_LABEL[o.status],o.documentUrl||'',o.notes||'']);
  });
  const wsDetail = XLSX.utils.aoa_to_sheet(detailData);
  wsDetail['!cols'] = [{wch:14},{wch:34},{wch:12},{wch:14},{wch:16},{wch:16},{wch:18},{wch:34},{wch:34}];

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, wsSummary, 'Resumen');
  XLSX.utils.book_append_sheet(wb, wsDetail, 'Obligaciones');
  XLSX.writeFile(wb, 'cumplimiento_' + new Date().toISOString().slice(0,10) + '.xlsx');
}

function escapeHtml(s){
  return (s||'').replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
}
function escapeAttr(s){
  return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
